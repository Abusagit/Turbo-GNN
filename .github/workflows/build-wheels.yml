name: Build and publish wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash -e -u -o pipefail {0}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build wheels (3 Pythons × 12 configs = 36 parallel jobs)
  # Approach from flash-attention:
  #   bare ubuntu-22.04 + actions/setup-python + Jimver/cuda-toolkit (nvcc only)
  #   cusparse headers come from pip-installed nvidia-cusparse-cu12
  # ---------------------------------------------------------------------------
  build:
    name: "py${{ matrix.python-version }} / torch${{ matrix.config.torch }} / ${{ matrix.config.cuda_tag }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        config:
          - { torch: "2.4.1", cuda_tag: "cu121", cuda_version: "12.1.1" }
          - { torch: "2.4.1", cuda_tag: "cu124", cuda_version: "12.4.1" }
          - { torch: "2.5.1", cuda_tag: "cu121", cuda_version: "12.1.1" }
          - { torch: "2.5.1", cuda_tag: "cu124", cuda_version: "12.4.1" }
          - { torch: "2.6.0", cuda_tag: "cu124", cuda_version: "12.4.1" }
          - { torch: "2.6.0", cuda_tag: "cu126", cuda_version: "12.6.3" }
          - { torch: "2.7.0", cuda_tag: "cu126", cuda_version: "12.6.3" }
          - { torch: "2.7.0", cuda_tag: "cu128", cuda_version: "12.8.1" }
          - { torch: "2.8.0", cuda_tag: "cu126", cuda_version: "12.6.3" }
          - { torch: "2.8.0", cuda_tag: "cu128", cuda_version: "12.8.1" }
          - { torch: "2.9.1", cuda_tag: "cu126", cuda_version: "12.6.3" }
          - { torch: "2.9.1", cuda_tag: "cu128", cuda_version: "12.8.1" }

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up swap space
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 10

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install CUDA ${{ matrix.config.cuda_version }}
        uses: Jimver/cuda-toolkit@v0.2.30
        id: cuda-toolkit
        with:
          cuda: "${{ matrix.config.cuda_version }}"
          method: network
          sub-packages: '["nvcc"]'

      - name: Install build dependencies
        run: pip install --upgrade pip setuptools wheel ninja

      - name: Install PyTorch
        run: |
          pip install --no-cache-dir torch==${{ matrix.config.torch }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.config.cuda_tag }}
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import torch; print('CUDA:', torch.version.cuda)"
          python -c "from torch.utils import cpp_extension; print('CUDA_HOME:', cpp_extension.CUDA_HOME)"

      - name: Create linker symlinks for nvidia pip packages
        run: |
          # nvidia pip packages ship e.g. libcusparse.so.12 but not libcusparse.so
          NVIDIA_DIR=$(python -c "import nvidia, os; print(os.path.dirname(nvidia.__file__))")
          find "$NVIDIA_DIR" -name '*.so.*' -type f | while read lib; do
            base=$(echo "$lib" | sed 's/\.so\..*/.so/')
            [ -e "$base" ] || ln -s "$lib" "$base"
          done

      - name: Build wheel
        env:
          TURBO_GNN_LOCAL_VERSION: "torch${{ matrix.config.torch }}.${{ matrix.config.cuda_tag }}"
          TORCH_CUDA_ARCH_LIST: "8.0 8.6 8.9 9.0"
          MAX_JOBS: "2"
        run: |
          pip wheel . --no-deps --no-build-isolation --wheel-dir dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: "wheel-torch${{ matrix.config.torch }}-${{ matrix.config.cuda_tag }}-py${{ matrix.python-version }}"
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Job 2: Build sdist (no CUDA needed)
  # ---------------------------------------------------------------------------
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Job 3: Create GitHub Release + publish sdist to PyPI (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Publish sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
