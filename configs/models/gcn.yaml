# 2-layer GCN with BatchNorm + ReLU + Dropout
architecture: node_classifier
num_classes: 0            # override at runtime from dataset
dropout: 0.5              # dropout before final linear head

encoder:
  layers:
    - conv_type: gcn
      backend: pyg
      in_channels: auto   # inferred from dataset feature dim
      out_channels: 128
      norm: batch
      activation: relu
      dropout: 0.5
      residual: false
      conv_kwargs:
        cached: true      # backend-specific (PyG GCNConv)
    - conv_type: gcn
      backend: pyg
      in_channels: auto   # inferred from previous layer
      out_channels: 128
      norm: batch
      activation: relu
      dropout: 0.5
      residual: true
      conv_kwargs:
        cached: true
