architecture: node_classifier

encoder:
  layers:
    - layer_type: residual_block
      conv_type: gat_v2
      backend: cugraph
      in_channels: auto
      out_channels: 16
      heads: 8
      norm: batch
      activation: elu
      dropout: 0.6
      residual: false
      conv_kwargs: {}       # PyG GAT default is concat=True for hidden layers
    - layer_type: residual_block
      conv_type: gat_v2
      backend: cugraph
      in_channels: auto
      out_channels: 7
      heads: 1
      norm: none
      activation: none
      dropout: 0.0
      residual: false
      conv_kwargs: {}      # last layer often concat=False
