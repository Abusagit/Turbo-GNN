architecture: node_classifier
num_classes: 0            # override at runtime from dataset
dropout: 0.5              # dropout before final linear head

encoder:
  layers:
    - layer_type: residual_block
      conv_type: mean_aggr
      backend: torch_native_meanaggr
      in_channels: auto   # inferred from dataset feature dim
      out_channels: 128
      norm: batch
      activation: relu
      dropout: 0.5
      residual: false
      conv_kwargs: {}
    - layer_type: residual_block
      conv_type: mean_aggr
      backend: torch_native_meanaggr
      in_channels: auto   # inferred from previous layer
      out_channels: 128
      norm: batch
      activation: relu
      dropout: 0.5
      residual: true
      conv_kwargs: {}
