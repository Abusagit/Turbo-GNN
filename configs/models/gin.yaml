architecture: node_classifier
num_classes: 0
dropout: 0.5

encoder:
  layers:
    - layer_type: residual_block
      conv_type: gin
      backend: pyg
      in_channels: auto
      out_channels: 64
      norm: batch
      activation: relu
      dropout: 0.5
      residual: false
      conv_kwargs:
        # PyG GINConv expects an NN (MLP) internally; backend wrapper should handle it.
        eps: 0.0
        train_eps: true
    - layer_type: residual_block
      conv_type: gin
      backend: pyg
      in_channels: auto
      out_channels: 64
      norm: batch
      activation: relu
      dropout: 0.5
      residual: true
      conv_kwargs:
        eps: 0.0
        train_eps: true
